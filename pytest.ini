[pytest]
# ── Marker registry ───────────────────────────────────────────────────────────
# Keeps `--strict-markers` clean; every marker must be declared here.
markers =
    unit:         Fast, fully isolated tests — no external services required
    integration:  Tests that require live Neo4j / SQLite on disk
    smoke:        Parametrized end-to-end fixture smoke tests (needs agent)
    evaluation:   Unit tests for evaluation metric functions (AnsQ / RetQ / ReaQ)
    conceptual:   Fixtures of type=conceptual (single-hop knowledge questions)
    yaml_gen:     Fixtures of type=yaml_gen (YAML generation tasks)
    relationship: Fixtures of type=relationship (multi-hop relationship questions)
    followup:     Fixtures of type=followup (context-dependent follow-up questions)
    realworld:    Fixtures of type=realworld (selected from StackOverflow via gate+scoring pipeline)
    multi_hop:    Fixtures where multi_hop=true
    single_hop:   Fixtures where multi_hop=false
    namespaced:   Fixtures with scope=Namespaced
    cluster:      Fixtures with scope=Cluster

# ── Default options ───────────────────────────────────────────────────────────
addopts =
    --strict-markers
    -ra
    --tb=short

# ── Custom CLI options (registered in conftest.py) ────────────────────────────
# --fixture-type  conceptual|yaml_gen|relationship|followup
# --multi-hop     true|false
# --scope         Namespaced|Cluster

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
