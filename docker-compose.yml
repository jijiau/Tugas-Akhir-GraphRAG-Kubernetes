services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: zep-postgres
    restart: always
    environment:
      POSTGRES_DB: zep
      POSTGRES_USER: zep
      POSTGRES_PASSWORD: zep_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zep"]
      interval: 5s
      timeout: 5s
      retries: 5
